<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoePhaGyi WC26 Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay-container">
        
        <div class="top-bug">
            <div class="channel-name">DoePhaGyi</div>
            <div class="event-name">World Cup '26 | Round of 16</div>
        </div>

        <div class="side-panel">
            <div class="panel-header">Match Info</div>
            
            <div class="panel-section">
                <div class="section-title">Team Formations</div>
                <div class="formation-header-row">
                    <span id="teamA-formation-text">Loading...</span>
                    <span class="vs-text">VS</span>
                    <span id="teamB-formation-text">Loading...</span>
                </div>
                
                <div class="pitch">
                    <div class="half-line"></div>
                    <div class="center-circle"></div>
                    <div id="teamA-players" class="team-players-grid team-a-layout"></div>
                    <div id="teamB-players" class="team-players-grid team-b-layout"></div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">Recent Form (Last 5 Matches)</div>
                <div class="result-row">
                    <img src="" class="small-flag" id="teamA-small-flag">
                    <div class="form-badges" id="teamA-form"></div>
                </div>
                <div class="result-row">
                    <img src="" class="small-flag" id="teamB-small-flag">
                    <div class="form-badges" id="teamB-form"></div>
                </div>
            </div>
        </div>

        <div class="lower-third-box">
            <div class="matchup-container">
                <div class="team team-a">
                    <img src="" alt="Team A" class="flag" id="teamA-flag">
                    <span class="team-name" id="teamA-name">Loading...</span>
                </div>
                
                <div class="vs-badge">VS</div>
                
                <div class="team team-b">
                    <span class="team-name" id="teamB-name">Loading...</span>
                    <img src="" alt="Team B" class="flag" id="teamB-flag">
                </div>
            </div>

            <div class="prediction-container">
                <span class="prediction-label">DoePhaGyi Tip:</span>
                <span class="prediction-text" id="prediction-text">Loading...</span>
            </div>
        </div>
        
    </div>

    <div class="controls">
        <button id="playPauseBtn" onclick="togglePlay()">⏸ Pause Auto-Play</button>
        <p>💡 OBS Source ကို Right-Click နှိပ်ပြီး <b>Interact</b> ခေါ်ကာ ဤခလုတ်ကို နှိပ်၍ ရပ်/ဖွင့် လုပ်နိုင်ပါသည်။</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
