<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoePhaGyi WC26 Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay-container">
        
        <div class="top-bug">
            <div class="channel-name">DoePhaGyi</div>
            <div class="event-name">World Cup '26 | Round of 16</div>
        </div>

        <div class="lower-third-box">
            
            <div class="matchup-container">
                <div class="team team-a">
                    <img src="assets/flags/argentina.png" alt="Team A" class="flag" id="teamA-flag">
                    <span class="team-name" id="teamA-name">Argentina</span>
                </div>
                
                <div class="vs-badge">VS</div>
                
                <div class="team team-b">
                    <span class="team-name" id="teamB-name">Spain</span>
                    <img src="assets/flags/spain.png" alt="Team B" class="flag" id="teamB-flag">
                </div>
            </div>

            <div class="prediction-container">
                <span class="prediction-label">DoePhaGyi Tip:</span>
                <span class="prediction-text" id="prediction-text">Argentina Win & Over 2.5 Goals</span>
            </div>

        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
